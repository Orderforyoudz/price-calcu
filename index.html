<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OrderForYouDZ - حاسبة السعر النهائي</title>

<style>

body{
    font-family: Arial, sans-serif;
    direction: rtl;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
    background:#f0f8ff;
}

.calculator{
    width:350px;
    padding:30px;
    text-align:center;
    border-radius:15px;
    background:url("background.png") no-repeat center;
    background-size:cover;
    box-shadow:0 10px 20px rgba(0,0,0,0.15);
}

h1{
    font-size:26px;
    color:#2c3e50;
    margin-bottom:10px;
}

.logo{
    width:100px;
    border-radius:10px;
    margin-bottom:15px;
}

p{
    color:#34495e;
    font-size:16px;
    margin-bottom:20px;
}

h2{
    color:#2c3e50;
    margin-bottom:10px;
}

input{
    width:100%;
    padding:12px;
    margin-top:10px;
    border-radius:8px;
    border:1px solid #ccc;
    font-size:18px;
}

input:focus{
    border-color:#ff6b6b;
    box-shadow:0 0 5px #ff6b6b;
    outline:none;
}

.result{
    margin-top:20px;
    font-size:22px;
    font-weight:bold;
    color:#27ae60;
    background:rgba(224,255,224,0.85);
    padding:15px;
    border-radius:10px;
}

</style>
</head>

<body>

<div class="calculator">

<h1>OrderForYouDZ</h1>

<img src="logo.png" alt="شعار الموقع" class="logo">

<p>احسب السعر النهائي للمنتج بسرعة وسهولة بالدينار الجزائري</p>

<h2>السعر النهائي للمنتج</h2>

<input 
type="number" 
id="usdPrice" 
placeholder="أدخل السعر بالدولار"
min="0"
step="0.01"
oninput="calculateFinal()"
/>

<div class="result" id="result">أدخل السعر بالدولار</div>

</div>

<script>

const exchangeRate = 250;      // سعر الدولار بالدينار
const fixedCommission = 250;  // عمولة ثابتة إذا السعر أقل من 10$
const percentageRate = 10;    // عمولة 10% إذا السعر 10$ أو أكثر

function calculateFinal(){

    const usd = parseFloat(document.getElementById("usdPrice").value);
    const result = document.getElementById("result");

    if(isNaN(usd)){
        result.innerHTML = "أدخل السعر بالدولار";
        return;
    }

    const priceDZD = usd * exchangeRate;
    let total = 0;

    if(usd < 10){
        total = priceDZD + fixedCommission;
    }else{
        total = priceDZD * (1 + percentageRate / 100);
    }

    result.innerHTML = "السعر النهائي: " + total.toLocaleString() + " دج";

}

</script>

</body>
</html>
