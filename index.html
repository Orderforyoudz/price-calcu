<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Order For You DZ - حاسبة السعر النهائي</title>

<style>

body{
    font-family: Arial, sans-serif;
    direction: rtl;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
    background:#f0f8ff;
}

.calculator{
    width:350px;
    padding:30px;
    text-align:center;
    border-radius:15px;
    background:url("background.png") no-repeat center;
    background-size:cover;
    box-shadow:0 10px 20px rgba(0,0,0,0.15);
}

h1{
    font-size:26px;
    color:#2c3e50;
    margin-bottom:10px;
}

.logo{
    width:100px;
    border-radius:10px;
    margin-bottom:15px;
}

p{
    color:#34495e;
    font-size:16px;
    margin-bottom:20px;
}

h2{
    color:#2c3e50;
    margin-bottom:10px;
}

input{
    width:100%;
    padding:12px;
    margin-top:10px;
    border-radius:8px;
    border:1px solid #ccc;
    font-size:18px;
}

input:focus{
    border-color:#ff6b6b;
    box-shadow:0 0 5px #ff6b6b;
    outline:none;
}

.result{
    margin-top:20px;
    font-size:22px;
    font-weight:bold;
    color:#27ae60;
    background:rgba(224,255,224,0.85);
    padding:15px;
    border-radius:10px;
}

</style>
</head>

<body>

<div class="calculator">

<h1>OrderForYouDZ</h1>

<img src="logo.png" alt="شعار الموقع" class="logo">

<p>احسب السعر النهائي للمنتج بسرعة وسهولة بالدينار الجزائري</p>

<h2>السعر النهائي للمنتج</h2>

<input 
type="number" 
id="usdPrice" 
placeholder="أدخل السعر بالدولار"
min="0"
step="0.01"
oninput="calculateFinal()"
/>

<div class="result" id="result">أدخل السعر بالدولار</div>

</div>

<script>

let rate = 250;

function calculateFinal(){

let usd = document.getElementById("usdPrice").value;

if(!usd){
document.getElementById("result").innerHTML="أدخل السعر بالدولار";
return;
}

let dzd = usd * rate;

let commission;

if(usd < 10){

commission = 250;

}else if(usd <= 40){

commission = dzd * 0.10;

}else{

commission = dzd * 0.08;

}

let final = dzd + commission;

document.getElementById("result").innerHTML =
final.toFixed(0) + " دج";

document.getElementById("details").innerHTML = "";

}

function copyPrice(){
let text = document.getElementById("result").innerText;
navigator.clipboard.writeText(text);
alert("تم نسخ السعر");
}

function resetCalc(){
document.getElementById("usdPrice").value="";
document.getElementById("result").innerHTML="أدخل السعر بالدولار";
document.getElementById("details").innerHTML="";
}

if ("serviceWorker" in navigator) {
navigator.serviceWorker.register("service-worker.js");
}

</script>
</body>
</html>
